# Load Balancer Configuration
# Mirrors the structure of load-balancer/config.yml (Go version)

# How often to check backend server health via TCP dial
health_check_interval: "5s"

# Multiple listeners — each with its own mode and algorithm
listeners:
  - listen_addr: "0.0.0.0:8000"
    mode: "http"
    algorithm: "weighted_round_robin"
    acls:
      - name: "even_path"
        pattern: "/even"
        target_hosts: ["localhost:9002"]
      - name: "odd_path"
        pattern: "/odd"
        target_hosts: ["localhost:9001", "localhost:9003"]

  - listen_addr: "0.0.0.0:9000"
    mode: "tcp"               # TCP Layer 4 load balancing
    algorithm: "weighted_round_robin"

# Backend servers shared across all listeners
servers:
  - host: "localhost:9001"
    max_connections: 100      # Max simultaneous connections allowed
    mode: "http"
    weight: 1

  - host: "localhost:9002"
    max_connections: 100
    mode: "http"
    weight: 2

  - host: "localhost:9003"
    max_connections: 100
    mode: "http"
    weight: 2
